<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — HealthLink</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo img { height: 50px; }
    h2 { text-align: center; color: #2d3748; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #718096; margin-bottom: 24px; font-size: 14px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: #4a5568; font-size: 14px; }
    input {
      width: 100%; padding: 12px;
      border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 14px; outline: none;
    }
    input:focus { border-color: #667eea; }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 6px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .message {
      padding: 12px; border-radius: 6px;
      margin-bottom: 16px; font-size: 14px;
      text-align: center; display: none;
    }
    .message.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .message.error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .back-link {
      display: block; text-align: center; margin-top: 16px;
      color: #667eea; text-decoration: none; font-size: 14px;
    }
    .expired-box {
      text-align: center; padding: 20px;
      color: #c53030; display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/Diagnostics/Patient/pictures/logo.png"
           onerror="this.src='https://via.placeholder.com/150x50?text=HEALTHLINK'">
    </div>

    <h2>Reset Password</h2>
    <p class="subtitle">Enter your new password below</p>

    <div id="message" class="message"></div>

    <div id="resetForm">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter new password">
      </div>
      <button class="btn" onclick="submitReset()">Reset Password</button>
    </div>

    <a href="/Solutions/corp_sol/corp_solsignup.html" class="back-link">
      ← Back to Login
    </a>
  </div>

  <script>
    const API_BASE = "http://localhost:5000/api/employee"

    // Get token from URL
    const params = new URLSearchParams(window.location.search)
    const token = params.get("token")
    const role = params.get("role")

    if (!token) {
      document.getElementById("resetForm").style.display = "none"
      showMessage("Invalid or missing reset link. Please request a new one.", "error")
    }

    function showMessage(msg, type) {
      const el = document.getElementById("message")
      el.textContent = msg
      el.className = `message ${type}`
      el.style.display = "block"
    }

    async function submitReset() {
      const newPassword = document.getElementById("newPassword").value
      const confirmPassword = document.getElementById("confirmPassword").value

      if (!newPassword || !confirmPassword) {
        showMessage("Both fields are required", "error")
        return
      }

      if (newPassword.length < 6) {
        showMessage("Password must be at least 6 characters", "error")
        return
      }

      if (newPassword !== confirmPassword) {
        showMessage("Passwords do not match", "error")
        return
      }

      try {
        const res = await fetch(`${API_BASE}/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, newPassword })
        })

        const data = await res.json()

        if (res.ok) {
          showMessage("✅ Password reset successfully! Redirecting to login...", "success")
          document.getElementById("resetForm").style.display = "none"
          setTimeout(() => {
            window.location.href = "/Solutions/corp_sol/corp_solsignup.html"
          }, 2500)
        } else {
          showMessage(data.message || "Reset failed. Please request a new link.", "error")
        }
      } catch (err) {
        showMessage("Server error. Please try again.", "error")
      }
    }
  </script>
</body>
</html>
