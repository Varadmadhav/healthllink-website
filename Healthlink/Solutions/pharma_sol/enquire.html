<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Information Form</title>
    <link rel="stylesheet" href="enquire.css">
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>Contact Information</h1>
            <p>Please fill out the form below with your organization details</p>
        </div>
        
        <div class="form-content">
            <form id="contactForm">
                <div class="form-group">
                    <label for="orgType">Organization Type <span class="required">*</span></label>
                    <div class="organization-type">
                        <div class="radio-group">
                            <input type="radio" id="company" name="orgType" value="company" required>
                            <label for="company">Company</label>
                        </div>
                        <div class="radio-group">
                            <input type="radio" id="hospital" name="orgType" value="hospital" required>
                            <label for="hospital">Hospital</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="orgName">Organization Name <span class="required">*</span></label>
                    <input type="text" id="orgName" name="orgName" placeholder="Enter your company or hospital name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>

                <div class="form-group">
                    <label for="contact">Contact Number <span class="required">*</span></label>
                    <input type="tel" id="contact" name="contact" placeholder="Enter your contact number" required>
                </div>

                <div class="form-group">
                    <label for="contactPerson">Contact Person Name <span class="required">*</span></label>
                    <input type="text" id="contactPerson" name="contactPerson" placeholder="Enter contact person's full name" required>
                </div>

                <button type="submit" class="submit-btn">Submit Information</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get form data
            const formData = new FormData(this);
            const data = {};
            
            for (let [key, value] of formData.entries()) {
                data[key] = value;
            }
            
            // Display submitted data (in a real application, you'd send this to a server)
            alert('Form submitted successfully!\n\nSubmitted Information:\n' + 
                  'Organization Type: ' + data.orgType + '\n' +
                  'Organization Name: ' + data.orgName + '\n' +
                  'Email: ' + data.email + '\n' +
                  'Contact: ' + data.contact + '\n' +
                  'Contact Person: ' + data.contactPerson);
            
            // Reset form
            this.reset();
        });

        // Add smooth focus animations
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            element.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
